// 5. PUZZLE
// ============================================================
function gamePuzzle() {
  const host = gameShell({
    id:'puzzle', title:'Puzzle',
    subtitle:'Memorize the picture, then slide tiles to rebuild it.',
    extraTop:`
      <div class="meta-row">
        <div>
          <span class="chip">Level <b id="lvl">1</b></span>
          <span class="chip">Score <b id="score">0</b></span>
          <span class="chip">Moves <b id="moves">0</b></span>
          <span class="chip">Solved <b id="solved">0</b></span>
        </div>
        <div><span class="chip">Grid <b id="gridChip">3×3</b></span></div>
      </div>
    `,
    mainHtml:`
      <div class="pz-stage">
        <div class="pz-preview" id="previewWrap">
          <div class="label">Reference</div>
          <canvas id="preview"></canvas>
        </div>
        <div class="pz-board" id="board"><canvas id="boardBg"></canvas></div>
      </div>
    `,
    helper:'Click two tiles to swap them. Click the same tile twice to deselect. Correct tiles glow green.',
  });
  host.actions.innerHTML = `<button id="start" class="primary">Start Game</button><button id="reset">Reset</button><label class="switch"><input type="checkbox" id="hideRef"> Hide reference</label>`;

  const preview = $('preview'); const previewWrap = $('previewWrap');
  const board = $('board'); const boardBg = $('boardBg');
  const elL=$('lvl'),elS=$('score'),elM=$('moves'),elSv=$('solved'),elG=$('gridChip');

  function drawImg(ctx, size, seed) {
    ctx.clearRect(0,0,size,size);
    const hue = seed*53 % 360;
    ctx.fillStyle = `hsl(${hue},30%,18%)`; ctx.fillRect(0,0,size,size);
    const pal = [`hsl(${hue},70%,55%)`,`hsl(${(hue+90)%360},70%,55%)`,`hsl(${(hue+180)%360},70%,55%)`,`hsl(${(hue+270)%360},70%,55%)`];
    const h=size/2; const ord=[0,1,2,3].slice().sort(()=>((seed*7)%2)?1:-1).sort(()=>Math.random()-.5);
    ctx.fillStyle=pal[ord[0]]; ctx.fillRect(0,0,h,h);
    ctx.fillStyle=pal[ord[1]]; ctx.fillRect(h,0,h,h);
    ctx.fillStyle=pal[ord[2]]; ctx.fillRect(0,h,h,h);
    ctx.fillStyle=pal[ord[3]]; ctx.fillRect(h,h,h,h);
    ctx.beginPath(); ctx.arc(size*.5+(seed%7-3)*8, size*.5+((seed*3)%7-3)*8, size*.28, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fill();
    ctx.save(); ctx.globalAlpha=.18; ctx.strokeStyle='#fff'; ctx.lineWidth=Math.max(3,size/40);
    const off = (seed*13)%20;
    for (let x=-size; x<size*2; x+=size/8) { ctx.beginPath(); ctx.moveTo(x+off,0); ctx.lineTo(x+off+size, size); ctx.stroke(); }
    ctx.restore();
    const shapes = 5+(seed%4);
    for (let i=0;i<shapes;i++) {
      const sx=(seed*97+i*53)%size, sy=(seed*131+i*71)%size, r=12+(i*4)%14;
      ctx.fillStyle=`hsla(${(hue+60+i*40)%360},80%,65%,.65)`; ctx.beginPath();
      if (i%3===0) ctx.arc(sx,sy,r,0,Math.PI*2);
      else if (i%3===1) ctx.rect(sx,sy,r*2,r*2);
      else {ctx.moveTo(sx,sy-r);ctx.lineTo(sx+r,sy+r);ctx.lineTo(sx-r,sy+r);ctx.closePath();}
      ctx.fill();
    }
    ctx.fillStyle='rgba(255,255,255,.10)'; ctx.font=`bold ${size*.32}px ui-sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('▲', size/2, size/2);
  }
  function spec(l){
    // Memorise window shrinks fast; grid grows to 6×6 endgame.
    if (l<=1) return{n:3, memMs:3500};
    if (l<=2) return{n:4, memMs:4000};
    if (l<=3) return{n:4, memMs:3000};
    if (l<=4) return{n:5, memMs:3500};
    if (l<=5) return{n:5, memMs:2400};
    if (l<=6) return{n:6, memMs:3000};
    if (l<=7) return{n:6, memMs:2000};
    return     {n:6, memMs:1500}; // 1.5s glimpse of a 35-tile puzzle
  }

  let state = fresh();
  function fresh(){return{active:false,level:1,maxLevel:1,score:0,solved:0,moves:0,n:3,slots:[],selectedIdx:-1,seed:1,boardStart:0,rts:[],bigCanvas:null,memorising:false,stopBar:null};}
  function newPic() {
    const px=360; const c=document.createElement('canvas'); c.width=px; c.height=px;
    drawImg(c.getContext('2d'), px, state.seed); state.bigCanvas=c;
    preview.width=130; preview.height=130; preview.getContext('2d').drawImage(c,0,0,130,130);
  }
  function swap(a,b){const t=state.slots[a];state.slots[a]=state.slots[b];state.slots[b]=t;}
  function solved(){for(let i=0;i<state.slots.length;i++)if(state.slots[i]!==i)return false;return true;}
  function correctCount(){let c=0;for(let i=0;i<state.slots.length;i++)if(state.slots[i]===i)c++;return c;}
  function newPuzzle() {
    const {n}=spec(state.level); state.n=n; elG.textContent=n+'×'+n;
    state.seed=Math.floor(Math.random()*1e6); newPic();
    state.slots=[]; for(let i=0;i<n*n;i++) state.slots.push(i);
    state.selectedIdx=-1; state.moves=0;
    // Fisher-Yates; reshuffle if already solved or too many tiles already in place
    let guard=0;
    do {
      for (let i=state.slots.length-1;i>0;i--){ const j=R(0,i); swap(i,j); }
      guard++;
    } while ((solved() || correctCount() > Math.max(1, Math.floor(n*n*0.3))) && guard < 20);
    render();
  }
  function render() {
    const n=state.n; const tilePx=Math.floor(Math.min(360,420)/n); const bp=tilePx*n;
    board.style.width=(bp+12)+'px'; board.style.height=(bp+12)+'px';
    boardBg.width=bp; boardBg.height=bp;
    const bg=boardBg.getContext('2d'); bg.fillStyle='#050810'; bg.fillRect(0,0,bp,bp);
    [...board.querySelectorAll('.pz-tile')].forEach(t=>t.remove());
    const big=state.bigCanvas;
    for (let i=0;i<n*n;i++) {
      const tid=state.slots[i]; const r=Math.floor(i/n),c=i%n;
      const d=document.createElement('div');
      let cls='pz-tile';
      if (i===state.selectedIdx) cls+=' selected';
      if (tid===i) cls+=' correct';
      d.className=cls;
      d.style.left=(c*tilePx+6)+'px'; d.style.top=(r*tilePx+6)+'px';
      d.style.width=tilePx+'px'; d.style.height=tilePx+'px';
      const cv=document.createElement('canvas'); cv.width=tilePx; cv.height=tilePx;
      const cx=cv.getContext('2d'); const sr=Math.floor(tid/n),sc=tid%n; const ss=big.width/n;
      cx.drawImage(big, sc*ss, sr*ss, ss, ss, 0, 0, tilePx, tilePx);
      cx.fillStyle='rgba(0,0,0,.45)'; cx.fillRect(0,tilePx-18,22,18);
      cx.fillStyle='#fff'; cx.font='bold 11px ui-sans-serif'; cx.textAlign='center'; cx.textBaseline='middle';
      cx.fillText(String(tid+1), 11, tilePx-9);
      d.appendChild(cv);
      d.addEventListener('click', ()=>onTile(i));
      board.appendChild(d);
    }
    elM.textContent=state.moves; elS.textContent=state.score; elL.textContent=state.level; elSv.textContent=state.solved;
  }
  function onTile(idx) {
    if (!state.active || state.memorising) return;
    if (state.selectedIdx === -1) {
      state.selectedIdx = idx; beep(440,.03);
      render(); return;
    }
    if (state.selectedIdx === idx) {
      state.selectedIdx = -1; render(); return;
    }
    swap(idx, state.selectedIdx);
    state.selectedIdx = -1; state.moves++; beep(580,.04);
    render();
    if (solved()) onSolved();
  }
  function onSolved() {
    const rt=(performance.now()-state.boardStart)/1000; state.rts.push(rt); beep(900,.18);
    state.solved++;
    const minMoves = state.n*state.n;
    const mp = Math.max(.4, 1 - Math.max(0, state.moves - minMoves)*.01);
    const sb = Math.max(.4, 1.6 - rt/60);
    const pts = Math.round(300 * state.level * sb * mp);
    state.score += pts;
    host.status.textContent = `Solved in ${rt.toFixed(1)}s, ${state.moves} moves! +${pts}`;
    host.status.className='status ok';
    state.level = Math.min(8, state.level+1); state.maxLevel = Math.max(state.maxLevel, state.level);
    setTimeout(()=>{ if (state.active) startTrial(); }, 900);
  }
  function startTrial() {
    newPuzzle(); state.memorising=true;
    host.status.textContent='Memorise the reference…'; host.status.className='status';
    // Always show the preview during memorise (even if hideRef was checked last round).
    previewWrap.style.visibility = 'visible';
    // Clear any leftover overlays from an interrupted round.
    [...board.querySelectorAll('.pz-overlay')].forEach(n => n.remove());
    const o=document.createElement('div'); o.className='pz-overlay'; o.textContent='Memorise…'; board.appendChild(o);
    const ms=spec(state.level).memMs;
    if (state.stopBar) state.stopBar();
    state.stopBar = runProgressBar(host, ms/1000, ()=>{
      if (!state.active) return;
      o.remove(); state.memorising=false; state.boardStart=performance.now();
      previewWrap.style.visibility = $('hideRef').checked ? 'hidden' : 'visible';
      host.status.textContent='Solve it!';
    });
  }
  let stopTotal = null;
  function startGame() {
    state=fresh(); state.active=true;
    stopTotal = makeTotalTimer(host, ()=>state.active, endGame);
    startTrial(); $('start').textContent='Restart';
  }
  function endGame() {
    state.active=false; if (stopTotal) stopTotal(); if (state.stopBar) state.stopBar();
    const sorted=state.rts.slice().sort((a,b)=>a-b); const med=sorted.length?sorted[Math.floor(sorted.length/2)]:null;
    const isPb = saveRun('puzzle', { score: state.score, level: state.maxLevel, solved: state.solved, accuracy: state.solved>0?1:0, rtMedian: med });
    const sz = spec(state.maxLevel).n;
    showModal('Puzzle — session complete', [
      ['Final score', state.score.toLocaleString()],
      ['Max grid solved', sz+'×'+sz],
      ['Puzzles solved', state.solved],
      ['Median solve time', med==null?'—':med.toFixed(1)+'s'],
    ], isPb);
  }
  $('start').addEventListener('click', startGame);
  $('reset').addEventListener('click', ()=>{ state.active=false; if (stopTotal) stopTotal(); if (state.stopBar) state.stopBar(); state=fresh();
    [...board.querySelectorAll('.pz-tile')].forEach(t=>t.remove());
    boardBg.getContext('2d').clearRect(0,0,boardBg.width,boardBg.height);
    preview.getContext('2d').clearRect(0,0,preview.width,preview.height);
    elL.textContent='1'; elS.textContent='0'; elM.textContent='0'; elSv.textContent='0';
    elG.textContent='3×3'; host.status.textContent='';
    host.totalClock.textContent=fmtTime(TOTAL); resetProgressBar(host); $('start').textContent='Start Game'; });
  currentTeardown = () => { state.active=false; if (stopTotal) stopTotal(); if (state.stopBar) state.stopBar(); };
}

// ============================================================
// 6. SHAPEDANCE
// ============================================================
function gameShapedance() {
  const host = gameShell({
    id:'shapedance', title:'Shapedance',
    subtitle:'Find every tile that matches another. Rotation does not change identity.',
    extraTop:`
      <div class="meta-row">
        <div>
          <span class="chip">Level <b id="lvl">1</b></span>
          <span class="chip">Score <b id="score">0</b></span>
          <span class="chip">Streak <b id="streak">0</b></span>
        </div>
        <div>
          <span class="chip">Grid <b id="gridChip">2×2</b></span>
          <span class="chip">Pick <b id="pickChip">—</b></span>
        </div>
      </div>
    `,
    mainHtml:`<div class="sd-grid" id="grid"></div>`,
    helper:'One pattern appears multiple times (possibly rotated). Select that many copies; partial credit is not given. Ignore spinning motion.',
  });
  host.actions.innerHTML = `<button id="start" class="primary">Start Game</button><button id="compare">Compare</button><button id="reset">Reset</button>`;
  const grid=$('grid');
  const elL=$('lvl'),elS=$('score'),elSt=$('streak'),elG=$('gridChip'),elP=$('pickChip');
  const COL=['#ef4444','#2f81f7','#eab308','#22c55e'];

  function rotCW(g){const n=g.length,r=Array.from({length:n},()=>Array(n));for(let i=0;i<n;i++)for(let j=0;j<n;j++)r[j][n-1-i]=g[i][j];return r;}
  function gridEq(a,b){if(a.length!==b.length)return false;for(let i=0;i<a.length;i++)for(let j=0;j<a.length;j++)if(a[i][j]!==b[i][j])return false;return true;}
  function eqRot(a,b){if(gridEq(a,b))return true;let r=b;for(let k=0;k<3;k++){r=rotCW(r);if(gridEq(a,r))return true;}return false;}
  function clone(g){return g.map(r=>r.slice());}
  function distinct(g){const s=new Set();for(const r of g)for(const v of r)if(v!==-1)s.add(v);return s.size;}
  function randomGrid(n){
    const tot=n*n; const minF=Math.max(2,Math.floor(.45*tot)); const maxF=Math.max(minF,Math.floor(.7*tot));
    const fill=minF+R(0,maxF-minF); const g=Array.from({length:n},()=>Array(n).fill(-1));
    const idxs=Array.from({length:tot},(_,k)=>k).sort(()=>Math.random()-.5).slice(0,fill);
    const pal = n<=3?3:4;
    for (const idx of idxs) g[Math.floor(idx/n)][idx%n]=R(0,pal-1);
    if (distinct(g)<2) { const [i,j]=[R(0,n-1),R(0,n-1)]; g[i][j]=R(0,3); }
    return g;
  }
  function mutate(g, intensity=.4) {
    const n=g.length, tot=n*n; const k=Math.max(1,Math.floor(tot*intensity));
    const out=clone(g); const idxs=Array.from({length:tot},(_,i)=>i).sort(()=>Math.random()-.5).slice(0,k);
    for (const idx of idxs) {
      const i=Math.floor(idx/n), j=idx%n; const r=Math.random();
      if (r<.4) { const cur=out[i][j]; let s=R(0,3); while(cur!==-1&&s===cur) s=R(0,3); out[i][j]=s; }
      else if (r<.7) out[i][j]=-1;
      else out[i][j]= out[i][j]===-1 ? R(0,3) : (out[i][j]+1)%4;
    }
    if (eqRot(g,out)) { const i=R(0,n-1),j=R(0,n-1); out[i][j]=out[i][j]===-1?R(0,3):-1; }
    return out;
  }
  function drawP(ctx, g) {
    const n=g.length; const w=ctx.canvas.width, h=ctx.canvas.height;
    ctx.clearRect(0,0,w,h); ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,w,h);
    const cell=Math.min(w,h)/n; ctx.strokeStyle='#22304a'; ctx.lineWidth=1;
    for (let i=1;i<n;i++){ ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,h);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(w,i*cell);ctx.stroke(); }
    for (let i=0;i<n;i++) for (let j=0;j<n;j++) {
      const v=g[i][j]; if (v===-1) continue;
      const cx=j*cell+cell/2, cy=i*cell+cell/2, r=cell*.30; ctx.fillStyle=COL[v];
      if (v===0){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();}
      else if (v===1){const s=r*1.6;ctx.fillRect(cx-s/2,cy-s/2,s,s);}
      else if (v===2){ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx-r,cy+r*.85);ctx.lineTo(cx+r,cy+r*.85);ctx.closePath();ctx.fill();}
      else {ctx.beginPath();ctx.moveTo(cx,cy-r);ctx.lineTo(cx+r,cy);ctx.lineTo(cx,cy+r);ctx.lineTo(cx-r,cy);ctx.closePath();ctx.fill();}
    }
    ctx.strokeStyle='#3b4660'; ctx.lineWidth=2; ctx.strokeRect(1,1,w-2,h-2);
  }
  function spec(l){
    // mutI = how many cells differ in a distractor; SMALLER = harder (near-miss)
    // Tile count climbs to 9 (3×3 of tiles) at top levels — much busier scan.
    if (l<=1) return{size:2, tiles:4, mutI:.5,  spinP:0};
    if (l<=2) return{size:3, tiles:6, mutI:.4,  spinP:.15};
    if (l<=3) return{size:3, tiles:6, mutI:.30, spinP:.25};
    if (l<=5) return{size:4, tiles:6, mutI:.25, spinP:.30};
    if (l<=7) return{size:4, tiles:8, mutI:.18, spinP:.40};
    if (l<=9) return{size:5, tiles:8, mutI:.16, spinP:.45};
    if (l<=12)return{size:5, tiles:9, mutI:.12, spinP:.55};
    return     {size:6, tiles:9, mutI:.10, spinP:.65};
  }

  let state = fresh();
  function fresh(){return{active:false,level:1,maxLevel:1,score:0,streak:0,bestStreak:0,correct:0,attempted:0,options:null,correctSet:null,selected:new Set(),roundStart:0,stopBar:null};}
  function build() {
    const s=spec(state.level);
    const matchPattern = randomGrid(s.size);
    const tiles=s.tiles; const minM=2; const maxM=Math.min(3, Math.max(minM,Math.floor(tiles/2)+1));
    const numM=minM+R(0,maxM-minM);
    const numD=tiles-numM;
    const opts=[];
    for (let i=0;i<numM;i++) opts.push({grid:matchPattern, rotate:R(0,3)*90, spin:Math.random()<s.spinP, isMatch:true});
    // distractors must not match each other or the matchPattern (mod rotation)
    const seen = [matchPattern];
    let g=0;
    while (opts.filter(o=>!o.isMatch).length<numD && g<400) {
      g++; const c=mutate(matchPattern, s.mutI);
      if (seen.some(x => eqRot(x, c))) continue;
      seen.push(c);
      opts.push({grid:c, rotate:R(0,3)*90, spin:Math.random()<s.spinP, isMatch:false});
    }
    for (let i=opts.length-1;i>0;i--){const j=R(0,i);[opts[i],opts[j]]=[opts[j],opts[i]];}
    state.options=opts;
    state.correctSet=new Set(opts.map((o,i)=>o.isMatch?i:-1).filter(i=>i!==-1));
    state.selected=new Set();
    elG.textContent=s.size+'×'+s.size;
    if (elP) elP.textContent = state.correctSet.size;
  }
  function render() {
    grid.innerHTML='';
    state.options.forEach((opt,idx)=>{
      const tile=document.createElement('div'); tile.className='sd-tile';
      const wrap=document.createElement('div'); wrap.className='sd-rot'; wrap.style.transform=`rotate(${opt.rotate}deg)`;
      const inner=document.createElement('div'); if (opt.spin) inner.classList.add('sd-spin');
      const cv=document.createElement('canvas'); cv.width=140; cv.height=140; drawP(cv.getContext('2d'), opt.grid);
      inner.appendChild(cv); wrap.appendChild(inner); tile.appendChild(wrap);
      tile.addEventListener('click', ()=>toggle(idx)); grid.appendChild(tile);
    });
    elL.textContent=state.level; elS.textContent=state.score; elSt.textContent=state.streak;
    state.roundStart=performance.now(); startQTimer();
  }
  function toggle(i) {
    if (!state.active) return;
    const el=grid.children[i];
    if (state.selected.has(i)) { state.selected.delete(i); el.classList.remove('selected'); return; }
    state.selected.add(i); el.classList.add('selected'); beep(700,.04,'triangle',.04);
    // Auto-evaluate as soon as you have picked the expected number of matches.
    if (state.correctSet && state.selected.size >= state.correctSet.size) {
      compare();
    }
  }
  function compare() {
    if (!state.active) return;
    if (state.stopBar) { state.stopBar(); state.stopBar = null; }
    state.attempted++;
    let ok = state.correctSet.size===state.selected.size;
    if (ok) for (const v of state.correctSet) if (!state.selected.has(v)) { ok=false; break; }
    const rt=(performance.now()-state.roundStart)/1000;
    // Reveal the truth on every tile so the player sees which were rotation-matches.
    for (let i = 0; i < state.options.length; i++) {
      const el = grid.children[i]; if (!el) continue;
      el.classList.remove('selected');
      const isMatch = state.correctSet.has(i);
      const picked = state.selected.has(i);
      if (isMatch && picked)       el.classList.add('reveal-correct');
      else if (isMatch && !picked) el.classList.add('reveal-missed');
      else if (!isMatch && picked) el.classList.add('reveal-wrong');
    }
    if (ok) {
      state.correct++; state.streak++; state.bestStreak=Math.max(state.bestStreak,state.streak); beep(900,.12);
      const sb=Math.max(.5,1.4-rt/22); const pts=Math.round(150*state.level*sb*(1+Math.min(state.streak,9)*.04));
      state.score+=pts; host.status.textContent=`Correct! +${pts}`; host.status.className='status ok';
      setTimeout(()=>{ if (!state.active) return;
        if (state.level < 4 || state.streak >= 2) { state.level = Math.min(16, state.level + 1); state.maxLevel = Math.max(state.maxLevel, state.level); }
        build(); render(); }, 350);
    } else {
      beep(180,.18,'square'); state.streak=0;
      host.status.textContent='Wrong. Green = found · yellow = missed · red = wrong pick.';
      host.status.className='status fail';
      setTimeout(()=>{ if (!state.active) return; state.level=Math.max(1,state.level-1); build(); render(); }, 800);
    }
  }
  function startQTimer() {
    // Tight budget: 12s at L1, ~3s at L16. Auto-eval keeps you from waiting.
    const budget=Math.max(3, 13 - state.level*.6);
    if (state.stopBar) state.stopBar();
    state.stopBar = runProgressBar(host, budget, ()=>{ if (state.active) compare(); });
  }
  let stopTotal = null;
  function startGame() {
    state=fresh(); state.active=true; build(); render();
    stopTotal=makeTotalTimer(host, ()=>state.active, endGame); $('start').textContent='Restart';
  }
  function endGame() {
    state.active=false; if (state.stopBar) state.stopBar(); if (stopTotal) stopTotal();
    const acc=state.attempted?state.correct/state.attempted:0;
    const isPb=saveRun('shapedance', { score: state.score, level: state.maxLevel, accuracy: acc, correct: state.correct, attempted: state.attempted, streak: state.bestStreak });
    showModal('Shapedance — session complete', [
      ['Final score', state.score.toLocaleString()],
      ['Max level reached', state.maxLevel],
      ['Accuracy', Math.round(acc*100)+'%'],
      ['Correct / Attempted', `${state.correct} / ${state.attempted}`],
      ['Best streak', state.bestStreak],
    ], isPb);
  }
  $('start').addEventListener('click', startGame);
  $('compare').addEventListener('click', compare);
  $('reset').addEventListener('click', ()=>{ state.active=false; if (state.stopBar) state.stopBar(); if (stopTotal) stopTotal(); state=fresh();
    grid.innerHTML=''; host.status.textContent='';
    elL.textContent='1'; elS.textContent='0'; elSt.textContent='0'; elG.textContent='2×2';
    host.totalClock.textContent=fmtTime(TOTAL); resetProgressBar(host); $('start').textContent='Start Game'; });
  currentTeardown = () => { state.active=false; if (state.stopBar) state.stopBar(); if (stopTotal) stopTotal(); };
}

// ============================================================
// 7. SINGULARITY
// ============================================================
function gameSingularity() {
  const host = gameShell({
    id:'singularity', title:'Singularity',
    subtitle:'Click the one unique shape. Rotation alone does <b>not</b> count.',
    extraTop:`
      <div class="meta-row">
        <div>
          <span class="chip">Level <b id="lvl">1</b></span>
          <span class="chip">Score <b id="score">0</b></span>
          <span class="chip">Streak <b id="streak">0</b></span>
        </div>
        <div><span class="chip">Tiles <b id="tilesChip">9</b></span></div>
      </div>
    `,
    mainHtml:`<div class="sn-field" id="field"></div>`,
    helper:'Scan systematically. Don\'t be fooled by rotated lookalikes.',
  });
  host.actions.innerHTML = `<button id="start" class="primary">Start Game</button><button id="reset">Reset</button>`;
  const field=$('field');
  const elL=$('lvl'),elS=$('score'),elSt=$('streak'),elT=$('tilesChip');

  const FORMS=['circle','square','triangle','diamond','pentagon','hexagon','star','plus','arrow'];
  const FILLS=['solid','outline','half-top','half-bottom','dot'];
  // Distinct vivid palette (easy levels only)
  const COLORS_VIVID=['#ef4444','#2f81f7','#22c55e','#eab308','#a855f7','#06b6d4','#f97316'];
  // Close-hue palettes — VERY hard to tell apart at a glance. Used mid-game.
  const NEAR_BLUE = ['#1e3a8a','#1d4ed8','#2563eb','#3b82f6','#60a5fa'];
  const NEAR_RED  = ['#7f1d1d','#991b1b','#b91c1c','#dc2626','#ef4444'];
  const NEAR_GRN  = ['#14532d','#166534','#15803d','#16a34a','#22c55e'];
  const NEAR_PUR  = ['#581c87','#6b21a8','#7e22ce','#9333ea','#a855f7'];
  const NEAR_ORA  = ['#7c2d12','#9a3412','#c2410c','#ea580c','#f97316'];
  const NEAR_PALETTES = [NEAR_BLUE, NEAR_RED, NEAR_GRN, NEAR_PUR, NEAR_ORA];
  // "Visually confusable" form clusters
  const FORMS_ROUND = ['circle','pentagon','hexagon'];
  const FORMS_ANGULAR = ['square','diamond','triangle'];
  const FORMS_SPIKY = ['star','plus','arrow'];

  function mkBase(p){return{form:pick(p.forms),color:pick(p.colors),fill:pick(p.fills)};}
  function sEq(a,b){return a.form===b.form&&a.color===b.color&&a.fill===b.fill;}
  function mkUnique(b,p,allowedAxes){
    // Pick exactly ONE axis among the allowed ones — and ensure the new value
    // is within the same restricted pool so the user can't shortcut on a salient
    // difference (e.g. a totally different color).
    const ax = pick(allowedAxes);
    const pool = p[ax+'s'];
    if (pool.length < 2) return null; // can't differ on this axis
    const u = {...b};
    let v = pick(pool); let g = 0;
    while (v === u[ax] && g++ < 50) v = pick(pool);
    u[ax] = v;
    return u;
  }
  function shapeSvg(s, sz) {
    const w=sz,h=sz,cx=w/2,cy=h/2,r=Math.min(w,h)*.36; const col=s.color; const sw=Math.max(2,sz*.10);
    const path={};
    path.circle=`<circle cx="${cx}" cy="${cy}" r="${r}" />`;
    path.square=`<rect x="${cx-r}" y="${cy-r}" width="${r*2}" height="${r*2}" />`;
    path.triangle=(()=>{const a=r*1.1;return `<polygon points="${cx},${cy-a} ${cx-a*.95},${cy+a*.7} ${cx+a*.95},${cy+a*.7}" />`;})();
    path.diamond=`<polygon points="${cx},${cy-r} ${cx+r},${cy} ${cx},${cy+r} ${cx-r},${cy}" />`;
    path.pentagon=(()=>{const p=[];for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;p.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));}return `<polygon points="${p.join(' ')}" />`;})();
    path.hexagon=(()=>{const p=[];for(let i=0;i<6;i++){const a=i*Math.PI/3;p.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));}return `<polygon points="${p.join(' ')}" />`;})();
    path.star=(()=>{const p=[];for(let i=0;i<10;i++){const rad=(i%2===0)?r:r*.45;const a=-Math.PI/2+i*Math.PI/5;p.push((cx+rad*Math.cos(a)).toFixed(1)+','+(cy+rad*Math.sin(a)).toFixed(1));}return `<polygon points="${p.join(' ')}" />`;})();
    path.plus=(()=>{const t=r*.4;return `<polygon points="${cx-t},${cy-r} ${cx+t},${cy-r} ${cx+t},${cy-t} ${cx+r},${cy-t} ${cx+r},${cy+t} ${cx+t},${cy+t} ${cx+t},${cy+r} ${cx-t},${cy+r} ${cx-t},${cy+t} ${cx-r},${cy+t} ${cx-r},${cy-t} ${cx-t},${cy-t}" />`;})();
    path.arrow=(()=>{const t=r*.35;return `<polygon points="${cx-r},${cy-t} ${cx+r*.3},${cy-t} ${cx+r*.3},${cy-r*.7} ${cx+r},${cy} ${cx+r*.3},${cy+r*.7} ${cx+r*.3},${cy+t} ${cx-r},${cy+t}" />`;})();
    let body=path[s.form]; let style='';
    if (s.fill==='solid') style=`fill="${col}" stroke="none"`;
    else if (s.fill==='outline') style=`fill="none" stroke="${col}" stroke-width="${sw}"`;
    if (s.fill==='half-top'||s.fill==='half-bottom') {
      const id='c'+Math.floor(Math.random()*1e6);
      const clip = s.fill==='half-top' ? `<rect x="0" y="0" width="${w}" height="${cy}"/>` : `<rect x="0" y="${cy}" width="${w}" height="${cy}"/>`;
      const defs=`<defs><clipPath id="${id}">${clip}</clipPath></defs>`;
      const outline = path[s.form].replace('/>',` fill="none" stroke="${col}" stroke-width="${Math.max(2,sw*.6)}"/>`);
      const fill = path[s.form].replace('/>',` fill="${col}" clip-path="url(#${id})"/>`);
      return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${defs}${outline}${fill}</svg>`;
    }
    if (s.fill==='dot') {
      const outline = path[s.form].replace('/>',` fill="none" stroke="${col}" stroke-width="${sw}"/>`);
      const dot = `<circle cx="${cx}" cy="${cy}" r="${r*.25}" fill="${col}"/>`;
      return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${outline}${dot}</svg>`;
    }
    body = body.replace('/>', ' '+style+'/>');
    return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">${body}</svg>`;
  }
  function spec(l){
    // Difficulty design:
    //  L1-2  : tiny grid, vivid distinct colors, any axis can differ.
    //  L3-4  : grid 4×4, fewer vivid colors, axis still any.
    //  L5-6  : grid 5×5, NEAR-hue palette → color differences are subtle.
    //  L7-9  : grid 6×6, SINGLE near-hue palette (no fallback to vivid),
    //          unique can differ on color *within* that palette OR fill/form,
    //          forms restricted to a "confusable cluster".
    //  L10+  : grid 6×6/7×7, color FIXED across all tiles → unique can only
    //          differ on fill, and only between visually similar fills (dot vs solid).
    //  L13+  : grid 7×7/8×8 with rotation noise everywhere.
    //  L16+  : grid 8×8, fill-only with single subtle axis, lots of spin/drift.
    const cluster = () => pick([FORMS_ROUND, FORMS_ANGULAR, FORMS_SPIKY]);
    const nearPal = () => pick(NEAR_PALETTES);
    if (l<=1) return{ n:3, p:{forms:FORMS.slice(0,3), colors:COLORS_VIVID.slice(0,3), fills:['solid','outline']}, ax:['form','color','fill'], spin:0, drift:0 };
    if (l<=2) return{ n:4, p:{forms:FORMS.slice(0,4), colors:COLORS_VIVID.slice(0,3), fills:['solid','outline']}, ax:['form','color','fill'], spin:0, drift:0 };
    if (l<=3) return{ n:4, p:{forms:FORMS.slice(0,5), colors:COLORS_VIVID.slice(0,3), fills:['solid','outline','dot']}, ax:['form','fill'], spin:.2, drift:0 };
    if (l<=4) return{ n:5, p:{forms:cluster().concat(pick(FORMS_SPIKY)), colors:COLORS_VIVID.slice(0,2), fills:['solid','outline','dot']}, ax:['form','fill'], spin:.25, drift:0 };
    if (l<=5) return{ n:5, p:{forms:cluster(), colors:nearPal().slice(0,3), fills:['solid','outline','dot']}, ax:['form','color','fill'], spin:.3, drift:.1 };
    if (l<=6) return{ n:6, p:{forms:cluster(), colors:nearPal().slice(0,4), fills:['solid','outline','dot','half-top']}, ax:['form','color','fill'], spin:.35, drift:.15 };
    if (l<=8) return{ n:6, p:{forms:cluster(), colors:nearPal(), fills:FILLS}, ax:['form','color','fill'], spin:.40, drift:.20 };
    if (l<=10){const pal=nearPal(); return{ n:6, p:{forms:cluster(), colors:[pal[2]], fills:FILLS}, ax:['fill','form'], spin:.45, drift:.20 };}
    if (l<=12){const pal=nearPal(); return{ n:7, p:{forms:cluster(), colors:[pal[2]], fills:FILLS}, ax:['fill'], spin:.50, drift:.25 };}
    if (l<=14){const pal=nearPal(); return{ n:7, p:{forms:[pick(cluster())], colors:[pal[2]], fills:['solid','dot','outline','half-top']}, ax:['fill'], spin:.55, drift:.30 };}
    if (l<=16){const pal=nearPal(); return{ n:8, p:{forms:[pick(cluster())], colors:[pal[2]], fills:['solid','dot','outline','half-top','half-bottom']}, ax:['fill'], spin:.60, drift:.30 };}
    if (l<=20){const pal=nearPal(); return{ n:8, p:{forms:[pick(cluster())], colors:[pal[2]], fills:FILLS}, ax:['fill'], spin:.65, drift:.35 };}
    if (l<=25){const pal=nearPal(); return{ n:9, p:{forms:[pick(cluster())], colors:[pal[2]], fills:FILLS}, ax:['fill'], spin:.70, drift:.40 };}
    // L26-30: 9×9 = 81 nearly identical tiles, fill-only difference, max motion noise.
    {const pal=nearPal(); return{ n:9, p:{forms:[pick(cluster())], colors:[pal[2]], fills:FILLS}, ax:['fill'], spin:.80, drift:.45 };}
  }

  // Forms whose visual is invariant under any 90° rotation
  const ROTATION_SYMMETRIC = new Set(['circle','square','diamond','plus','hexagon']);
  // Fills that break under 180° rotation (half-top ↔ half-bottom)
  const ROTATION_BREAKING_FILL = new Set(['half-top','half-bottom']);
  function safeRotation(shape, allowRotate) {
    if (!allowRotate) return 0;
    if (ROTATION_BREAKING_FILL.has(shape.fill)) return 0;
    if (ROTATION_SYMMETRIC.has(shape.form))    return 0;
    return R(0,3) * 90;
  }

  const MAX_LEVEL = 30;
  const START_LEVEL = 4;

  let state = fresh();
  function fresh(){return{active:false,level:START_LEVEL,maxLevel:START_LEVEL,score:0,streak:0,bestStreak:0,correct:0,attempted:0,rts:[],round:null,uniqueIdx:-1,roundStart:0,stopBar:null};}
  function build() {
    const sp = spec(state.level); const n = sp.n, total = n*n;
    const allowed = sp.ax.filter(a => sp.p[a+'s'].length >= 2);
    const safeAllowed = allowed.length ? allowed : ['fill'];
    let base = mkBase(sp.p);
    let u = mkUnique(base, sp.p, safeAllowed);
    let guard = 0;
    while ((!u || sEq(base, u)) && guard++ < 100) {
      base = mkBase(sp.p);
      u = mkUnique(base, sp.p, safeAllowed);
    }
    if (!u || sEq(base, u)) {
      // Hard fallback: force a different form (most visually obvious).
      const otherForms = FORMS.filter(f => f !== base.form);
      if (otherForms.length) u = { ...base, form: pick(otherForms) };
      else u = { ...base, fill: pick(FILLS.filter(f => f !== base.fill)) || 'outline' };
    }
    const cells = [];
    const uniqueAt = R(0, total - 1);
    const allowRotate = state.level >= 5; // delay rotation noise slightly
    for (let i = 0; i < total; i++) {
      const shape = i === uniqueAt ? u : base;
      cells.push({
        shape,
        rotate: safeRotation(shape, allowRotate),
        spin: Math.random() < sp.spin,
        drift: Math.random() < sp.drift,
      });
    }
    state.uniqueIdx = uniqueAt;
    state.round = { cells, n };
    elT.textContent = total;
  }
  function render() {
    const {cells,n}=state.round;
    field.style.gridTemplateColumns=`repeat(${n}, 1fr)`; field.innerHTML='';
    const cp = Math.max(46, Math.min(82, Math.floor(520/n)));
    cells.forEach((c,idx)=>{
      const d=document.createElement('div'); d.className='sn-cell'+(c.spin?' spin':'')+(c.drift?' drift':'');
      d.style.width=cp+'px'; d.style.height=cp+'px';
      d.innerHTML=`<div style="transform:rotate(${c.rotate}deg)">${shapeSvg(c.shape, Math.floor(cp*.85))}</div>`;
      d.addEventListener('click', ()=>onClick(idx));
      field.appendChild(d);
    });
    elL.textContent=state.level; elS.textContent=state.score; elSt.textContent=state.streak;
    state.roundStart=performance.now(); startQTimer();
  }
  function onClick(idx) {
    if (!state.active) return;
    if (state.stopBar) { state.stopBar(); state.stopBar = null; }
    state.attempted++;
    const rt=(performance.now()-state.roundStart)/1000;
    const cell=field.children[idx];
    if (idx===state.uniqueIdx) {
      state.correct++; state.rts.push(rt); state.streak++; state.bestStreak=Math.max(state.bestStreak,state.streak);
      cell.classList.add('right'); beep(880,.12);
      const sb=Math.max(.4, 1.6 - rt/8);
      const pts=Math.round(100*state.level*sb*(1+Math.min(state.streak,9)*.05));
      state.score+=pts; host.status.textContent=`Correct! +${pts} (${rt.toFixed(1)}s)`; host.status.className='status ok';
      if (state.level < 8 || state.streak >= 2) {
        state.level = Math.min(MAX_LEVEL, state.level + 1);
        state.maxLevel = Math.max(state.maxLevel, state.level);
      }
      setTimeout(()=>{ if (state.active){build(); render();} }, 600);
    } else {
      cell.classList.add('wrong'); field.children[state.uniqueIdx].classList.add('right');
      beep(180,.18,'square'); state.streak=0;
      host.status.textContent='Wrong, that was not the unique one.'; host.status.className='status fail';
      setTimeout(()=>{ if (!state.active) return; state.level=Math.max(1,state.level-1); build(); render(); }, 900);
    }
  }
  function startQTimer() {
    // 24s @ L1, down to ~4s @ L30
    const budget=Math.max(4, 26 - state.level*.75);
    if (state.stopBar) state.stopBar();
    state.stopBar = runProgressBar(host, budget, ()=>{
      if (!state.active) return;
      state.stopBar = null; state.attempted++; state.streak=0;
      host.status.textContent='Time up!'; host.status.className='status fail';
      field.children[state.uniqueIdx].classList.add('right');
      setTimeout(()=>{ if (state.active){state.level=Math.max(1,state.level-1); build(); render();} }, 900);
    });
  }
  let stopTotal = null;
  function startGame() {
    state=fresh(); state.active=true; build(); render();
    stopTotal=makeTotalTimer(host, ()=>state.active, endGame); $('start').textContent='Restart';
  }
  function endGame() {
    state.active=false; if (state.stopBar) state.stopBar(); if (stopTotal) stopTotal();
    const acc=state.attempted?state.correct/state.attempted:0;
    const sorted=state.rts.slice().sort((a,b)=>a-b); const med=sorted.length?sorted[Math.floor(sorted.length/2)]:null;
    const isPb=saveRun('singularity', { score: state.score, level: state.maxLevel, accuracy: acc, correct: state.correct, attempted: state.attempted, rtMedian: med });
    showModal('Singularity — session complete', [
      ['Final score', state.score.toLocaleString()],
      ['Max level reached', state.maxLevel],
      ['Accuracy', Math.round(acc*100)+'%'],
      ['Correct / Attempted', `${state.correct} / ${state.attempted}`],
      ['Median response time', med==null?'—':med.toFixed(2)+'s'],
    ], isPb);
  }
  $('start').addEventListener('click', startGame);
  $('reset').addEventListener('click', ()=>{ state.active=false; if (state.stopBar) state.stopBar(); if (stopTotal) stopTotal(); state=fresh();
    field.innerHTML=''; host.status.textContent='';
    elL.textContent=String(START_LEVEL); elS.textContent='0'; elSt.textContent='0';
    elT.textContent=String(spec(START_LEVEL).n * spec(START_LEVEL).n);
    host.totalClock.textContent=fmtTime(TOTAL); resetProgressBar(host); $('start').textContent='Start Game'; });
  // Show the starting chip values right away.
  elL.textContent=String(START_LEVEL); elT.textContent=String(spec(START_LEVEL).n * spec(START_LEVEL).n);
  currentTeardown = () => { state.active=false; if (state.stopBar) state.stopBar(); if (stopTotal) stopTotal(); };
}

// ---------- boot ----------
route();
})();
</script>
