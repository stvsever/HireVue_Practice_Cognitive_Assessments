<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pathfinder · HireVue Practice</title>
  <style>
    :root {
      --bg:#0b0f17; --panel:#131a24; --panel-2:#1a2330; --border:#233146;
      --text:#e6edf3; --muted:#8b97a8; --accent:#2f81f7; --accent-2:#5dd5c4;
      --ok:#22c55e; --warn:#eab308; --bad:#ef4444;
    }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 60px 20px 40px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 18px; padding: 24px; }
    h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.3px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .progress-wrap { flex: 1; height: 10px; background: #0a1018; border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .1s linear; }
    .clock { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 13px; min-width: 50px; text-align: right; }
    .switch { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
    .switch input { accent-color: var(--accent); }
    .meta-row { display:flex; justify-content:space-between; align-items:center; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
    .chip { display:inline-block; background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 5px 10px; font-size: 12px; color: var(--text); }
    .chip b { color: var(--accent-2); font-weight: 600; }
    .board {
      display: grid; gap: 6px; margin: 0 auto;
      background: #0a1018; padding: 10px; border-radius: 14px; border: 1px solid var(--border);
      width: fit-content;
    }
    .cell {
      background: linear-gradient(180deg, #182234, #121a28);
      border-radius: 8px; cursor: pointer; position: relative;
      width: 72px; height: 72px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s ease, outline .1s ease;
    }
    .cell.fixed { cursor: default; background: linear-gradient(180deg, #1c2a3f, #131c2c); }
    .cell.selected { outline: 3px solid var(--accent); }
    .cell.connected { background: linear-gradient(180deg, #163525, #0e2118); }
    .cell svg { width: 100%; height: 100%; display: block; }
    .badge-letter { position: absolute; top: 4px; left: 6px; font-size: 10px; color: var(--muted); }
    .status { margin-top: 12px; min-height: 22px; font-size: 14px; text-align: center; }
    .ok { color: var(--ok); }
    .fail { color: var(--bad); }
    .actions { display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 10px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; }
    button.primary { background: linear-gradient(180deg, var(--accent), #1c66cf); border-color: transparent; }
    .helper { color: var(--muted); font-size: 12px; margin-top: 6px; text-align: center; }
    .back-btn { position: fixed; top: 14px; left: 14px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: var(--panel); color:var(--text); border:1px solid var(--border); border-radius: 999px; text-decoration: none; z-index: 10; }
    .modal-back { position: fixed; inset: 0; background: rgba(2,6,12,0.7); display: none; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(6px); }
    .modal-back.show { display: flex; }
    .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; max-width: 460px; width: 90%; }
    .modal h2 { margin: 0 0 6px; font-size: 22px; }
    .modal .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 14px; }
    .modal .row:last-child { border-bottom: 0; }
    .modal .row b { color: var(--accent-2); }
    .pb-flag { display: inline-block; background: rgba(34,197,94,0.15); color: var(--ok); padding: 4px 8px; border-radius: 999px; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <a class="back-btn" href="../" aria-label="Back to hub">←</a>

  <div class="wrap">
    <div class="panel">
      <h1>Pathfinder</h1>
      <div class="subtitle">Swap two tiles to connect <span style="color:var(--ok)">Start</span> to <span style="color:var(--bad)">End</span>.</div>

      <div class="topbar">
        <div class="progress-wrap"><div id="progress" class="progress-bar"></div></div>
        <div class="clock" id="totalClock" title="Total time">03:00</div>
        <label class="switch"><input type="checkbox" id="sound" checked> Sound</label>
      </div>

      <div class="meta-row">
        <div>
          <span class="chip">Level <b id="lvl">1</b></span>
          <span class="chip">Score <b id="score">0</b></span>
          <span class="chip">Moves <b id="moves">0</b></span>
        </div>
        <div>
          <span class="chip">Optimal <b id="opt">0</b></span>
        </div>
      </div>

      <div class="board" id="board"></div>
      <div class="status" id="status"></div>

      <div class="actions">
        <button id="start" class="primary">Start Game</button>
        <button id="check">Check Path</button>
        <button id="reset">Reset</button>
      </div>
      <div class="helper">Click two tiles to swap them. Start/End are fixed.</div>
    </div>
  </div>

  <div class="modal-back" id="modalBack">
    <div class="modal">
      <h2>Session complete</h2>
      <div class="subtitle">Here's how you did this run.</div>
      <div class="row"><span>Final score</span><b id="mScore">0</b></div>
      <div class="row"><span>Max level reached</span><b id="mLevel">1</b></div>
      <div class="row"><span>Solved boards</span><b id="mSolved">0</b></div>
      <div class="row"><span>Median solve time</span><b id="mRt">—</b></div>
      <div id="pbFlag" class="pb-flag" style="display:none">New personal best!</div>
      <div class="actions">
        <button class="primary" id="mAgain">Play again</button>
        <a href="../" style="text-decoration:none;"><button>Back to hub</button></a>
      </div>
    </div>
  </div>

  <script>
  (() => {
    const GAME = 'pathfinder';
    const TOTAL = 180;
    const $ = (id) => document.getElementById(id);

    const els = {
      board: $('board'), status: $('status'), progress: $('progress'),
      totalClock: $('totalClock'),
      lvl: $('lvl'), score: $('score'), moves: $('moves'), opt: $('opt'),
      start: $('start'), check: $('check'), reset: $('reset'), sound: $('sound'),
      modalBack: $('modalBack'),
      mScore: $('mScore'), mLevel: $('mLevel'), mSolved: $('mSolved'), mRt: $('mRt'),
      pbFlag: $('pbFlag'), mAgain: $('mAgain'),
    };
    function beep(freq=440, dur=0.08, type='sine', vol=0.05) {
      if (!els.sound.checked) return;
      try {
        const c = beep._ctx || (beep._ctx = new (window.AudioContext || window.webkitAudioContext)());
        const o = c.createOscillator(); const g = c.createGain();
        o.type = type; o.frequency.value = freq; g.gain.value = vol;
        o.connect(g); g.connect(c.destination); o.start();
        g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
        o.stop(c.currentTime + dur);
      } catch(e) {}
    }

    // Directions: 0=N, 1=E, 2=S, 3=W
    const DX = [0, 1, 0, -1]; const DY = [-1, 0, 1, 0]; const OPP = [2, 3, 0, 1];

    // Tile: { open: [N,E,S,W] booleans, kind: 'start'|'end'|'path' }
    function tileFromOpenings(arr) { return { open: arr.slice(), kind: 'path' }; }
    function rotateTile(t, n) {
      // rotate openings n times clockwise: new[i] = old[(i - n + 4) % 4]
      const r = [false,false,false,false];
      for (let i=0;i<4;i++) r[i] = t.open[(i - n + 4) % 4];
      return { ...t, open: r };
    }
    function tileKey(t) { return t.open.map(b=>b?1:0).join('') + ':' + t.kind; }

    // ------ Level spec ------
    function spec(lvl) {
      // size & desired path length in tiles (incl start/end)
      if (lvl === 1) return { size: 3, pathLen: 5 };
      if (lvl === 2) return { size: 4, pathLen: 7 };
      if (lvl === 3) return { size: 4, pathLen: 9 };
      if (lvl === 4) return { size: 5, pathLen: 11 };
      if (lvl === 5) return { size: 5, pathLen: 13 };
      if (lvl === 6) return { size: 6, pathLen: 16 };
      return { size: 6, pathLen: 20 };
    }

    // ------ Generate solvable board ------
    function genPath(size, pathLen) {
      // Random self-avoiding walk from start to end edges
      const tries = 200;
      for (let attempt = 0; attempt < tries; attempt++) {
        const sy = Math.floor(Math.random()*size);
        const ey = Math.floor(Math.random()*size);
        const start = { x: 0, y: sy };
        const end =   { x: size-1, y: ey };
        const visited = Array.from({length: size}, () => Array(size).fill(false));
        const path = [start]; visited[sy][0] = true;
        let cur = start; let steps = 0;
        const limit = pathLen + 10;
        while (steps < limit) {
          // bias toward end
          const dirOrder = [0,1,2,3].sort(()=>Math.random()-0.5);
          // Prefer East if not yet halfway through path
          if (Math.random() < 0.6) dirOrder.sort((a,b) => (b===1?1:0)-(a===1?1:0));
          let advanced = false;
          for (const d of dirOrder) {
            const nx = cur.x + DX[d], ny = cur.y + DY[d];
            if (nx < 0 || nx >= size || ny < 0 || ny >= size) continue;
            if (visited[ny][nx]) continue;
            // Avoid moving back to col 0 once we've left
            // Also try to leave end column until last step
            if (nx === end.x && ny === end.y && path.length + 1 < pathLen - 0) {
              // only step on end when nearly at desired length
              if (path.length + 1 < pathLen) continue;
            }
            visited[ny][nx] = true;
            cur = { x: nx, y: ny };
            path.push(cur);
            advanced = true;
            break;
          }
          if (!advanced) break;
          if (cur.x === end.x && cur.y === end.y) break;
          steps++;
        }
        if (cur.x === end.x && cur.y === end.y && path.length >= Math.min(pathLen, size*2)) {
          return { path, start, end };
        }
      }
      // Fallback: simple zigzag
      const path = [];
      let y = 0;
      for (let x = 0; x < size; x++) {
        path.push({x, y});
      }
      return { path, start: path[0], end: path[path.length-1] };
    }

    function buildBoard(lvl) {
      const { size, pathLen } = spec(lvl);
      const { path, start, end } = genPath(size, pathLen);
      // Build tiles for each cell on path
      const board = Array.from({length: size}, () =>
        Array.from({length: size}, () => ({ open: [false,false,false,false], kind: 'empty' }))
      );
      // For each consecutive pair in path, mark opening
      for (let i = 0; i < path.length; i++) {
        const p = path[i];
        const t = board[p.y][p.x];
        if (i > 0) {
          const prev = path[i-1];
          const dx = prev.x - p.x, dy = prev.y - p.y;
          const dir = (dy === -1) ? 0 : (dx === 1) ? 1 : (dy === 1) ? 2 : 3;
          t.open[dir] = true;
        }
        if (i < path.length - 1) {
          const nxt = path[i+1];
          const dx = nxt.x - p.x, dy = nxt.y - p.y;
          const dir = (dy === -1) ? 0 : (dx === 1) ? 1 : (dy === 1) ? 2 : 3;
          t.open[dir] = true;
        }
        t.kind = 'path';
      }
      board[start.y][start.x].kind = 'start';
      board[end.y][end.x].kind = 'end';

      // Fill non-path cells with distractor tiles
      const distractorOpenings = [
        [true,true,false,false],  // L
        [false,true,true,false],
        [false,false,true,true],
        [true,false,false,true],
        [true,false,true,false],  // straight
        [false,true,false,true],
        [true,true,true,false],   // T
        [false,true,true,true],
        [true,false,true,true],
        [true,true,false,true],
      ];
      for (let y=0;y<size;y++) for (let x=0;x<size;x++) {
        if (board[y][x].kind === 'empty') {
          const op = distractorOpenings[Math.floor(Math.random()*distractorOpenings.length)];
          board[y][x] = { open: op.slice(), kind: 'path' };
        }
      }

      // Collect swappable cells (kind=path)
      const swappable = [];
      for (let y=0;y<size;y++) for (let x=0;x<size;x++) {
        if (board[y][x].kind === 'path') swappable.push({x, y});
      }
      // Scramble: random pair swaps among swappables; do ~ pathLen swaps
      const swapCount = Math.max(pathLen, Math.floor(swappable.length * 0.85));
      for (let k=0;k<swapCount;k++) {
        const a = swappable[Math.floor(Math.random()*swappable.length)];
        const b = swappable[Math.floor(Math.random()*swappable.length)];
        if (a === b) continue;
        const tmp = board[a.y][a.x]; board[a.y][a.x] = board[b.y][b.x]; board[b.y][b.x] = tmp;
      }

      // Make sure board is NOT solved initially. If by accident it is, do another swap.
      if (isSolved(board, start, end)) {
        const a = swappable[0], b = swappable[swappable.length-1];
        const tmp = board[a.y][a.x]; board[a.y][a.x] = board[b.y][b.x]; board[b.y][b.x] = tmp;
      }

      return { size, board, start, end, optimalSwaps: Math.ceil(swapCount/2) };
    }

    // Connectivity check: follow openings from start; end must be reached
    function isSolved(board, start, end) {
      const size = board.length;
      const seen = Array.from({length:size}, ()=>Array(size).fill(false));
      const q = [[start.x, start.y]];
      seen[start.y][start.x] = true;
      while (q.length) {
        const [x,y] = q.shift();
        if (x === end.x && y === end.y) return true;
        const t = board[y][x];
        for (let d=0; d<4; d++) {
          if (!t.open[d]) continue;
          const nx = x + DX[d], ny = y + DY[d];
          if (nx<0||ny<0||nx>=size||ny>=size) continue;
          if (seen[ny][nx]) continue;
          const nt = board[ny][nx];
          if (!nt.open[OPP[d]]) continue;
          seen[ny][nx] = true;
          q.push([nx, ny]);
        }
      }
      return false;
    }

    // Find connected cells from start (for highlighting)
    function connectedFromStart(board, start) {
      const size = board.length;
      const seen = Array.from({length:size}, ()=>Array(size).fill(false));
      const q = [[start.x, start.y]];
      seen[start.y][start.x] = true;
      while (q.length) {
        const [x,y] = q.shift();
        const t = board[y][x];
        for (let d=0; d<4; d++) {
          if (!t.open[d]) continue;
          const nx = x + DX[d], ny = y + DY[d];
          if (nx<0||ny<0||nx>=size||ny>=size) continue;
          if (seen[ny][nx]) continue;
          const nt = board[ny][nx];
          if (!nt.open[OPP[d]]) continue;
          seen[ny][nx] = true;
          q.push([nx, ny]);
        }
      }
      return seen;
    }

    // ------ State ------
    let state = null;
    function freshState() {
      return {
        active: false, level: 1, maxLevel: 1, score: 0, solved: 0,
        moves: 0, board: null, size: 3, start: null, end: null,
        selected: null, optimalSwaps: 0,
        rts: [], boardStart: 0,
        totalTimer: null, totalLeft: TOTAL,
      };
    }

    // ------ Render ------
    function svgForTile(t, sizePx) {
      // Draw connecting lines from center to each open edge.
      const s = sizePx;
      const cx = s/2;
      const stroke = t.kind === 'start' ? '#22c55e' : (t.kind === 'end' ? '#ef4444' : '#9bc1ff');
      const sw = Math.max(8, sizePx*0.18);
      let lines = '';
      const endPts = [
        [cx, 0],            // N
        [s, cx],            // E
        [cx, s],            // S
        [0, cx],            // W
      ];
      for (let d=0; d<4; d++) {
        if (!t.open[d]) continue;
        const [ex, ey] = endPts[d];
        lines += `<line x1="${cx}" y1="${cx}" x2="${ex}" y2="${ey}" stroke="${stroke}" stroke-width="${sw}" stroke-linecap="round"/>`;
      }
      // Decorative for start/end: dot
      let cap = '';
      if (t.kind === 'start' || t.kind === 'end') {
        const col = t.kind === 'start' ? '#22c55e' : '#ef4444';
        cap = `<circle cx="${cx}" cy="${cx}" r="${Math.max(8, s*0.12)}" fill="${col}"/>`;
      }
      const dot = (t.kind !== 'start' && t.kind !== 'end' && t.open.some(x=>x))
        ? `<circle cx="${cx}" cy="${cx}" r="${Math.max(4, sw*0.42)}" fill="${stroke}" opacity="0.7"/>` : '';
      return `<svg viewBox="0 0 ${s} ${s}">${lines}${dot}${cap}</svg>`;
    }

    function render() {
      els.board.innerHTML = '';
      els.board.style.gridTemplateColumns = `repeat(${state.size}, 1fr)`;
      const cellPx = Math.min(72, Math.floor(380 / state.size));
      const reachable = connectedFromStart(state.board, state.start);
      const reachesEnd = reachable[state.end.y][state.end.x];

      for (let y=0;y<state.size;y++) {
        for (let x=0;x<state.size;x++) {
          const t = state.board[y][x];
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.style.width = cellPx + 'px'; cell.style.height = cellPx + 'px';
          if (t.kind === 'start' || t.kind === 'end') cell.classList.add('fixed');
          if (reachable[y][x]) cell.classList.add('connected');
          if (state.selected && state.selected.x === x && state.selected.y === y) cell.classList.add('selected');
          cell.innerHTML = svgForTile(t, cellPx);
          if (t.kind === 'start') {
            const b = document.createElement('div'); b.className = 'badge-letter'; b.textContent = 'S';
            b.style.color = '#22c55e'; cell.appendChild(b);
          } else if (t.kind === 'end') {
            const b = document.createElement('div'); b.className = 'badge-letter'; b.textContent = 'E';
            b.style.color = '#ef4444'; cell.appendChild(b);
          }
          cell.addEventListener('click', () => onCellClick(x, y));
          els.board.appendChild(cell);
        }
      }
      els.moves.textContent = state.moves;
      els.score.textContent = state.score;
      els.lvl.textContent = state.level;
      els.opt.textContent = state.optimalSwaps;
      if (reachesEnd) {
        els.status.textContent = 'Path connected! Click "Check Path" to confirm.';
        els.status.className = 'status ok';
      } else {
        els.status.textContent = '';
        els.status.className = 'status';
      }
    }

    function onCellClick(x, y) {
      if (!state.active) return;
      const t = state.board[y][x];
      if (t.kind === 'start' || t.kind === 'end') {
        beep(220, 0.08, 'square', 0.04); return;
      }
      if (state.selected) {
        if (state.selected.x === x && state.selected.y === y) {
          state.selected = null; render(); return;
        }
        // swap
        const a = state.selected;
        const tmp = state.board[a.y][a.x]; state.board[a.y][a.x] = state.board[y][x]; state.board[y][x] = tmp;
        state.selected = null;
        state.moves++;
        beep(620, 0.06, 'sine', 0.04);
        render();
      } else {
        state.selected = { x, y }; beep(440, 0.05, 'sine', 0.03); render();
      }
    }

    function onCheck() {
      if (!state.active) return;
      const ok = isSolved(state.board, state.start, state.end);
      if (ok) {
        const rt = (performance.now() - state.boardStart)/1000;
        state.rts.push(rt);
        beep(900, 0.14, 'sine', 0.06);
        const movePenalty = Math.max(0.4, 1 - Math.max(0, state.moves - state.optimalSwaps)*0.05);
        const speedBonus = Math.max(0.4, 1.6 - rt/40);
        const pts = Math.round(250 * state.level * speedBonus * movePenalty);
        state.score += pts;
        state.solved++;
        els.status.textContent = `Solved! +${pts}`;
        els.status.className = 'status ok';
        // Advance to next level
        state.level = Math.min(7, state.level + 1);
        state.maxLevel = Math.max(state.maxLevel, state.level);
        setTimeout(() => { if (state.active) startNewBoard(); }, 800);
      } else {
        beep(180, 0.18, 'square', 0.05);
        els.status.textContent = 'Not connected yet — keep going.';
        els.status.className = 'status fail';
      }
    }

    function startNewBoard() {
      const r = buildBoard(state.level);
      state.size = r.size; state.board = r.board;
      state.start = r.start; state.end = r.end; state.optimalSwaps = r.optimalSwaps;
      state.moves = 0; state.selected = null; state.boardStart = performance.now();
      render();
    }

    // Total timer
    function fmtTime(s) { const m=Math.floor(s/60).toString().padStart(2,'0'); const r=(s%60).toString().padStart(2,'0'); return m+':'+r; }
    function startTotalTimer() {
      els.totalClock.textContent = fmtTime(state.totalLeft);
      clearInterval(state.totalTimer);
      state.totalTimer = setInterval(() => {
        if (!state.active) { clearInterval(state.totalTimer); return; }
        state.totalLeft--;
        els.totalClock.textContent = fmtTime(state.totalLeft);
        const pct = state.totalLeft / TOTAL * 100;
        els.progress.style.width = pct + '%';
        if (state.totalLeft <= 0) endGame();
      }, 1000);
    }

    function startGame() {
      state = freshState();
      state.active = true;
      startTotalTimer();
      startNewBoard();
      els.start.textContent = 'Restart';
    }

    function endGame() {
      state.active = false;
      clearInterval(state.totalTimer);
      const sorted = state.rts.slice().sort((a,b)=>a-b);
      const med = sorted.length ? sorted[Math.floor(sorted.length/2)] : null;
      const key = 'hvp.best.' + GAME;
      let prev = null;
      try { prev = JSON.parse(localStorage.getItem(key) || 'null'); } catch {}
      const newRun = {
        score: state.score, level: state.maxLevel, solved: state.solved,
        accuracy: state.solved > 0 ? 1 : 0,
        rtMedian: med, runs: (prev && prev.runs ? prev.runs : 0) + 1, at: Date.now()
      };
      let isPb = false;
      if (!prev || newRun.score > (prev.score || 0)) { isPb = true; localStorage.setItem(key, JSON.stringify(newRun)); }
      else { prev.runs = newRun.runs; localStorage.setItem(key, JSON.stringify(prev)); }
      els.mScore.textContent = state.score.toLocaleString();
      els.mLevel.textContent = state.maxLevel;
      els.mSolved.textContent = state.solved;
      els.mRt.textContent = med == null ? '—' : med.toFixed(1) + 's';
      els.pbFlag.style.display = isPb ? 'inline-block' : 'none';
      els.modalBack.classList.add('show');
    }

    // Bindings
    els.start.addEventListener('click', startGame);
    els.check.addEventListener('click', onCheck);
    els.reset.addEventListener('click', () => {
      if (state) { state.active = false; clearInterval(state.totalTimer); }
      state = freshState();
      els.board.innerHTML = ''; els.status.textContent = '';
      els.lvl.textContent='1'; els.score.textContent='0'; els.moves.textContent='0'; els.opt.textContent='0';
      els.totalClock.textContent = fmtTime(TOTAL); els.progress.style.width = '100%';
      els.start.textContent = 'Start Game';
    });
    els.mAgain.addEventListener('click', () => { els.modalBack.classList.remove('show'); startGame(); });

    state = freshState();
    els.totalClock.textContent = fmtTime(TOTAL);
  })();
  </script>
</body>
</html>
